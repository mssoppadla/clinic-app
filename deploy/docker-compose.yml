# Local containerized run (mirrors prod topology: api x2 behind caddy, postgres, redis).
# Secrets come from .env (never committed). cpmai stays in its own compose project; this one
# uses its own DB + network so co-hosting never collides.
name: clinic-saas
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clinic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-clinic}
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U $${POSTGRES_USER}"], interval: 10s, retries: 5 }
  redis:
    image: redis:7-alpine
  api:
    build: ../apps/api
    env_file: [../.env]
    environment:
      APP_ENV: prod
      # Admin/owner connection (superuser) — used by bootstrap/migrations to create the app
      # role, schema, RLS policies and grants.
      APP_ADMIN_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-clinic}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-clinic}
      # App connection (non-superuser 'clinic_app' role) — what the API serves requests on,
      # so Postgres RLS actually enforces. Password REQUIRED in .env (bootstrap creates the role).
      APP_DATABASE_URL: postgresql+psycopg://clinic_app:${APP_DB_APP_PASSWORD:?set APP_DB_APP_PASSWORD in .env}@db:5432/${POSTGRES_DB:-clinic}
    depends_on:
      db: { condition: service_healthy }
    restart: unless-stopped          # single replica for now; zero-downtime (>=2 + migration lock) is a later refinement
  caddy:
    image: caddy:2-alpine
    ports: ["8080:80"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../web:/srv/web:ro
    depends_on: [api]
volumes: { dbdata: {} }
