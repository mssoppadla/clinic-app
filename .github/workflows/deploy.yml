name: deploy
# Test gate -> migration drift -> manual approval -> SSH into VPS -> run scripts/vps/deploy.sh
#
# Triggered by:
#   - push to main (after a PR is merged)
#   - workflow_dispatch (manual "Run workflow" button)
#
# The deploy job is gated by GitHub Environment "production":
#   - set up at https://github.com/<owner>/<repo>/settings/environments
#   - requires explicit approval from a configured reviewer (you)
#   - restrict deployments to the main branch
#   - holds the SSH secrets (VPS_HOST, VPS_USER, VPS_SSH_KEY, VPS_HOST_KEY)
# See DEPLOYMENT.md for one-time setup.
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: production-deploy
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  # --------------------------------------------------------------------------
  # Strict test gate. Unlike backend-ci.yml (advisory `|| true`), this MUST pass
  # for the deploy job to start.
  # --------------------------------------------------------------------------
  test:
    name: Test gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s
          --health-timeout 5s --health-retries 5
        ports: ["6379:6379"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip", cache-dependency-path: apps/api/requirements.txt }
      - name: Install backend deps
        run: pip install -r apps/api/requirements.txt
      - name: Backend tests (strict)
        run: cd apps/api && PYTHONPATH=. pytest -q
      - name: Backward-compat gate (additive migrations only)
        run: python deploy/check_additive_migration.py

  # --------------------------------------------------------------------------
  # Migration <-> model drift gate, on a real Postgres (matches prod engine).
  # Bootstrap mirrors deploy.sh fresh-DB path (create_all + RLS + stamp head),
  # then `alembic check` (model<->migration drift) and `alembic upgrade head`
  # (idempotency on the bootstrapped schema).
  # --------------------------------------------------------------------------
  migration-drift:
    name: Migration drift check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: clinic
          POSTGRES_PASSWORD: clinic_test
          POSTGRES_DB: clinic_migr
        options: >-
          --health-cmd "pg_isready -U clinic -d clinic_migr"
          --health-interval 10s --health-timeout 5s --health-retries 5
        ports: ["5432:5432"]
    env:
      APP_DATABASE_URL: postgresql+psycopg://clinic:clinic_test@localhost:5432/clinic_migr
      APP_ENV: ci
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: "3.12", cache: "pip", cache-dependency-path: apps/api/requirements.txt }
      - name: Install backend deps
        run: pip install -r apps/api/requirements.txt
      - name: Bootstrap schema (mirror deploy.sh fresh-DB path) on Postgres
        run: cd apps/api && PYTHONPATH=. python scripts/bootstrap_db.py
      - name: alembic check (model <-> migration drift, advisory)
        run: cd apps/api && PYTHONPATH=. alembic check || true
      - name: alembic upgrade head (idempotency on bootstrapped schema)
        run: cd apps/api && PYTHONPATH=. alembic upgrade head

  # --------------------------------------------------------------------------
  # Deploy gate — requires MANUAL approval via the "production" Environment.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to production VPS
    needs: [test, migration-drift]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: https://tovaitech.in
    steps:
      - uses: actions/checkout@v6   # for scripts/vps/upsert_env.py (secret sync below)
      - name: Configure SSH
        # Secrets:
        #   VPS_HOST     - hostname or IP
        #   VPS_USER     - e.g. "deploy"
        #   VPS_SSH_KEY  - private key content (ed25519 recommended)
        #   VPS_HOST_KEY - output of `ssh-keyscan <host>` (host-key pinning)
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [ -n "${{ secrets.VPS_HOST_KEY }}" ]; then
            printf '%s\n' "${{ secrets.VPS_HOST_KEY }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 600 ~/.ssh/known_hosts
      - name: Sync app secrets into VPS .env (GitHub-managed)
        # Push GitHub-managed app secrets into /opt/clinic-app/.env before deploy.sh runs.
        # The pairs travel base64-encoded over the ssh channel (stdin -> env var P, never argv
        # or logs; GitHub also masks the raw values). upsert_env.py replaces/append only these
        # keys and SKIPS empty ones, so an unset secret never blanks an existing value.
        # We scp the helper from the runner so this works even on the first deploy (before the
        # VPS repo has it).
        run: |
          scp -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=20 \
              scripts/vps/upsert_env.py \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/upsert_env.py"
          {
            printf 'APP_JWT_SECRET=%s\n'          "${{ secrets.APP_JWT_SECRET }}"
            printf 'APP_SUPERADMIN_EMAIL=%s\n'     "${{ secrets.APP_SUPERADMIN_EMAIL }}"
            printf 'APP_SUPERADMIN_PASSWORD=%s\n'  "${{ secrets.APP_SUPERADMIN_PASSWORD }}"
            printf 'APP_DB_APP_PASSWORD=%s\n'      "${{ secrets.APP_DB_APP_PASSWORD }}"
          } | base64 -w0 | ssh -o StrictHostKeyChecking=yes -o BatchMode=yes -o ConnectTimeout=20 \
              "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
              'P=$(cat); P="$P" python3 /tmp/upsert_env.py /opt/clinic-app/.env; rm -f /tmp/upsert_env.py'
      - name: Run deploy.sh on VPS
        # deploy.sh: pre-deploy data-guard snapshot, git sync, build, alembic/bootstrap,
        # idempotent seed, health-gated container swap, canary smoke, data-preservation
        # verify, rollback on failure. Non-zero exit fails this step (surfaced in GitHub UI).
        #
        # Retry-with-backoff for the SSH *connection* only. GitHub-hosted runners use
        # rotating egress IPs, and the VPS intermittently drops the TCP handshake to port 22
        # (fail2ban / rate-limit / transient network), causing "connect to host: Connection
        # timed out". ssh exits 255 on its own connect/transport failures; any other non-zero
        # is deploy.sh's real exit code, passed through. So we retry ONLY on 255 (safe: the
        # script never ran) and fail fast on a genuine deploy failure (no wasteful re-runs).
        run: |
          attempts=5
          for i in $(seq 1 "$attempts"); do
            echo "::group::deploy attempt $i/$attempts"
            set +e
            ssh -o StrictHostKeyChecking=yes -o BatchMode=yes \
                -o ConnectTimeout=20 -o ServerAliveInterval=15 -o ServerAliveCountMax=4 \
                "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
                'set -e; cd /opt/clinic-app && bash scripts/vps/deploy.sh'
            rc=$?
            set -e
            echo "::endgroup::"
            if [ "$rc" -eq 0 ]; then
              echo "deploy succeeded on attempt $i"
              exit 0
            fi
            if [ "$rc" -ne 255 ]; then
              echo "::error::deploy.sh failed on the VPS (exit $rc) — not a connection error, not retrying"
              exit "$rc"
            fi
            echo "ssh connection failed (exit 255) on attempt $i"
            if [ "$i" -lt "$attempts" ]; then
              sleep $((i * 15))
            fi
          done
          echo "::error::could not reach the VPS over SSH after $attempts attempts"
          exit 1
      - name: Post-deploy public smoke
        run: |
          curl -fsS https://tovaitech.in/api/v1/healthz | grep -qi 'ok\|healthy'
          curl -fsS -o /dev/null -w "page %{http_code}\n" https://tovaitech.in
