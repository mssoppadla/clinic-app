<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#0e7c66"/>
<meta http-equiv="Cache-Control" content="no-store"/>
<title>Team & users · admin</title>
<link rel="stylesheet" href="/appointments/assets/styles/app.css?v=8"/>
<script src="/appointments/assets/admin-auth.js"></script>
</head>
<body>
<div class="top">
  <div class="brandlogo">T</div>
  <div><h1>Team &amp; users</h1><p>Clinic admin · staff accounts</p></div>
</div>

<div class="adminwrap">
  <div id="error" class="err hidden"></div>

  <section class="card">
    <div class="cardhead"><h3>Add a team member</h3></div>
    <p class="hint">Creates a login with a one-time temporary password. They’ll be asked to set
      their own password on first sign-in (or reset it via WhatsApp OTP).</p>
    <div class="grid2">
      <div class="field"><label>Email <span class="muted">(login)</span></label>
        <input class="input" id="email" type="email" placeholder="person@clinic.in"/></div>
      <div class="field"><label>WhatsApp phone <span class="muted">(for OTP reset)</span></label>
        <input class="input" id="phone" inputmode="tel" placeholder="+91 ..."/></div>
    </div>
    <div class="grid2">
      <div class="field"><label>Role</label>
        <select class="select" id="role">
          <option value="doctor">Doctor</option>
          <option value="front_desk">Front desk</option>
          <option value="triage">Triage</option>
          <option value="clinic_admin">Clinic admin</option>
        </select></div>
      <div class="field hidden" id="clinicField"><label>Clinic <span class="muted">(platform admin)</span></label>
        <select class="select" id="tenant_id"><option value="">Select a clinic…</option></select></div>
    </div>
    <button class="btn" id="addBtn" type="button">Create user</button>
    <div id="created"></div>
  </section>

  <section class="card">
    <div class="cardhead"><h3>Team <span id="count" class="pill n">…</span></h3></div>
    <div id="list"></div>
  </section>
</div>

<script>
const Q = new URLSearchParams(location.search);
const API = (Q.get('api') || window.API_BASE || (location.port==='8080' ? 'http://localhost:8077' : '/api/v1')).replace(/\/$/,'');
const $ = s => document.querySelector(s);
const showError = m => { const e=$('#error'); e.textContent=m; e.classList.remove('hidden'); window.scrollTo(0,0); };
const clearError = () => $('#error').classList.add('hidden');
const ROLE_LABEL = {superadmin:'Platform admin', clinic_admin:'Clinic admin', doctor:'Doctor', front_desk:'Front desk', triage:'Triage'};

async function load(){
  clearError();
  try{
    const r = await authFetch(`${API}/users`);
    if(!r.ok){ if(r.status!==401) showError('Could not load users.'); return; }
    const rows = (await r.json()).users || [];
    $('#count').textContent = rows.length;
    $('#list').innerHTML = rows.length ? rows.map(u=>{
      const roles = (u.roles||[]).map(x=>ROLE_LABEL[x.role]||x.role).join(', ');
      const revoked = u.status==='revoked';
      return `<div class="kv">
        <span><b>${u.email}</b> <span class="muted">${roles}${u.phone?' · '+u.phone:''}</span>
          ${revoked?'<span class="pill r" style="margin-left:6px">revoked</span>':(u.must_reset_password?'<span class="pill a" style="margin-left:6px">pending first login</span>':'')}</span>
        ${revoked?'':`<button class="btn ghost sm" data-revoke="${u.id}">Revoke</button>`}
      </div>`;
    }).join('') : '<p class="muted" style="padding:8px 0">No users yet.</p>';
    $('#list').querySelectorAll('[data-revoke]').forEach(b=>{
      b.onclick = ()=>revoke(b.getAttribute('data-revoke'), b);
    });
  }catch(e){ showError('Network error.'); }
}

$('#addBtn').onclick = async ()=>{
  clearError(); $('#created').innerHTML='';
  const email = $('#email').value.trim();
  if(!email.includes('@')){ showError('Enter a valid email.'); return; }
  const body = { email, phone: $('#phone').value.trim()||null, role: $('#role').value };
  const tid = $('#tenant_id').value.trim(); if(tid) body.tenant_id = tid;
  $('#addBtn').disabled = true;
  try{
    const r = await authFetch(`${API}/users`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
    const d = await r.json();
    if(!r.ok){ showError((d.error&&d.error.message)||'Could not create user'); return; }
    $('#created').innerHTML = `<div class="result ok" style="margin-top:10px">Created <b>${d.email}</b>. Temporary password (share securely, shown once):
      <div class="snippet" style="margin-top:6px">${d.temp_password}</div></div>`;
    $('#email').value=''; $('#phone').value='';
    load();
  }catch(e){ showError('Network error.'); }
  finally{ $('#addBtn').disabled = false; }
};

async function revoke(id, btn){
  clearError(); btn.disabled=true;
  try{
    const r = await authFetch(`${API}/users/${id}/revoke`, {method:'POST'});
    if(!r.ok){ const d=await r.json(); showError((d.error&&d.error.message)||'Revoke failed'); btn.disabled=false; return; }
    load();
  }catch(e){ showError('Network error.'); btn.disabled=false; }
}

async function loadClinics(){
  // Platform admins get a clinic picker (live clinics). Clinic admins get 403 here and
  // the picker stays hidden — the backend uses their own clinic.
  try{
    const r = await authFetch(`${API}/onboarding/clinics`);
    if(!r.ok) return;
    const clinics = (await r.json()).clinics || [];
    const sel = $('#tenant_id');
    clinics.forEach(c=>{ const o=document.createElement('option'); o.value=c.tenant_id; o.textContent=`${c.name} (${c.slug})`; sel.appendChild(o); });
    $('#clinicField').classList.remove('hidden');
  }catch(e){}
}

requireLogin();
load();
loadClinics();
</script>
</body>
</html>
